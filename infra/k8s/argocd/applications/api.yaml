apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: proseed-api
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Image Updater가 Application의 spec.source.kustomize.images를 수정할 수 있도록
  # ApplicationSet controller가 이 필드를 무시. 없으면 다음 reconcile에서 원복됨.
  ignoreApplicationDifferences:
    - jsonPointers:
        - /spec/source/kustomize/images
  goTemplate: true
  goTemplateOptions: ['missingkey=error']
  generators:
    - list:
        elements:
          - env: production
            branch: main
  template:
    metadata:
      name: 'proseed-api-{{.env}}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      labels:
        app.kubernetes.io/environment: '{{.env}}'
      annotations:
        argocd-image-updater.argoproj.io/image-list: 'api=ghcr.io/skkuding/proseed/api:{{.branch}}'
        argocd-image-updater.argoproj.io/api.update-strategy: digest
        argocd-image-updater.argoproj.io/write-back-method: argocd
    spec:
      project: default
      source:
        path: 'infra/k8s/api'
        repoURL: https://github.com/skkuding/proseed
        targetRevision: '{{.branch}}'
        directory:
          recurse: false
      destination:
        namespace: proseed
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
