name: Build and Push Docker GHCR

on:
  push:
    paths:
      - 'apps/web/**'
      - 'apps/api/**'
      - 'infra/k8s/postgres/backup/image/**'
      - '.github/workflows/build-and-push.yaml'
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Client-side OTEL endpoint (injected at build time)
  NEXT_PUBLIC_OTEL_EXPORTER_OTLP_ENDPOINT: 'https://otel.proseednow.com'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.app_filter.outputs.changes }}
      postgres_backup: ${{ steps.backup_filter.outputs.postgres_backup }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed apps
        uses: dorny/paths-filter@v3
        id: app_filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - '.github/workflows/build-and-push.yaml'
            api:
              - 'apps/api/**'
              - '.github/workflows/build-and-push.yaml'

      - name: Detect changed Postgres backup image
        uses: dorny/paths-filter@v3
        id: backup_filter
        with:
          filters: |
            postgres_backup:
              - 'infra/k8s/postgres/backup/image/**'
              - '.github/workflows/build-and-push.yaml'

  build-and-push:
    needs: changes
    if: needs.changes.outputs.apps != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.apps) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.app }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.app }}:main
          build-args: |
            NEXT_PUBLIC_OTEL_EXPORTER_OTLP_ENDPOINT=${{ env.NEXT_PUBLIC_OTEL_EXPORTER_OTLP_ENDPOINT }}
            NEXT_PUBLIC_APP_ENV=production
            NEXT_PUBLIC_API_URL=https://proseednow.com/api
            NEXT_PUBLIC_GA_MEASUREMENT_ID=G-X9Z2BWG12G

  build-and-push-postgres-backup:
    needs: changes
    if: needs.changes.outputs.postgres_backup == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Postgres backup image
        uses: docker/build-push-action@v6
        with:
          context: infra/k8s/postgres/backup/image
          file: infra/k8s/postgres/backup/image/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/postgres-backup:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/postgres-backup:main
